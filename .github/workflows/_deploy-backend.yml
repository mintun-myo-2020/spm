name: Deploy Backend (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws-region:
        required: false
        type: string
        default: ap-southeast-1
      java-version:
        required: false
        type: string
        default: '25'
      ssm-service-tag:
        required: false
        type: string
        default: backend

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
          cache: 'gradle'

      - name: Build jar
        working-directory: spm
        run: ./gradlew bootJar --no-daemon

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Upload jar to S3
        run: |
          JAR_FILE=$(ls spm/build/libs/*.jar | head -1)
          aws s3 cp "$JAR_FILE" s3://${{ secrets.DEV_DEPLOY_BUCKET }}/spm-app.jar

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Service,Values=${{ inputs.ssm-service-tag }}" "Key=tag:Environment,Values=${{ inputs.environment }}" \
            --parameters 'commands=[
              "aws s3 cp s3://${{ secrets.DEV_DEPLOY_BUCKET }}/spm-app.jar /opt/spm/spm-app.jar",
              "sudo systemctl restart spm"
            ]' \
            --output text
