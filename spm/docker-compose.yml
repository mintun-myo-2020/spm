# ============================================================
# SPM Docker Compose
# ============================================================
# All credentials and URLs are driven by the .env file.
# Copy .env.example to .env and adjust for your environment.
# ============================================================

services:
  postgres:
    image: postgres:17
    container_name: spm-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spm}
      POSTGRES_USER: ${POSTGRES_USER:-spm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spm}
    ports:
      - "5432:5432"
    volumes:
      - spm-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spm}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak-postgres:
    image: postgres:17
    container_name: spm-keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME:-keycloak}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: spm-keycloak
    command: start-dev --import-realm
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '\"status\"\\s*:\\s*\"UP\"'"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  tesseract:
    image: jitesoft/tesseract-ocr:latest
    container_name: spm-tesseract
    # Keep the container running so we can docker exec into it
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - ./uploads:/data
    restart: unless-stopped

  app:
    image: spm-app:latest
    container_name: spm-app
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-spm}
      DB_USERNAME: ${DB_USERNAME:-spm}
      DB_PASSWORD: ${DB_PASSWORD:-spm}
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/spm
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/spm/protocol/openid-connect/certs
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: spm
      KEYCLOAK_ADMIN_CLIENT_ID: spm-backend
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:?Set KEYCLOAK_ADMIN_CLIENT_SECRET in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"

volumes:
  spm-pgdata:
  keycloak-pgdata:
