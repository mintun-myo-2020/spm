name: Deploy Backend (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws-region:
        required: false
        type: string
        default: ap-southeast-1

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Build jar
        working-directory: spm
        run: ./gradlew bootJar --no-daemon

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Discover infra from SSM
        id: ssm
        run: |
          PREFIX="/${{ vars.PROJECT_NAME }}/${{ vars.ENVIRONMENT }}/cicd"
          echo "artifacts-bucket=$(aws ssm get-parameter --name "$PREFIX/artifacts-bucket" --query Parameter.Value --output text)" >> "$GITHUB_OUTPUT"

      - name: Upload jar to S3
        run: |
          JAR_FILE=$(ls spm/build/libs/*.jar | head -1)
          aws s3 cp "$JAR_FILE" s3://${{ steps.ssm.outputs.artifacts-bucket }}/spm-app.jar

      - name: Trigger deploy via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Service,Values=backend" "Key=tag:Environment,Values=${{ vars.ENVIRONMENT }}" \
            --parameters 'commands=[
              "bash /opt/deploy/deploy.sh"
            ]' \
            --output text
