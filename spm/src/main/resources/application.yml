spring:
  application:
    name: spm

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spm}
    username: ${DB_USERNAME:spm}
    password: ${DB_PASSWORD:spm}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/spm}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/spm/protocol/openid-connect/certs}

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=3600s

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  keycloak:
    server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8180}
    realm: ${KEYCLOAK_REALM:spm}
    admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:spm-backend}
    admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
  bedrock:
    region: ${APP_BEDROCK_REGION:ap-southeast-1}
  storage:
    type: ${APP_STORAGE_TYPE:local}
    local-path: ${APP_STORAGE_LOCAL_PATH:./uploads}
    s3-bucket: ${APP_STORAGE_S3_BUCKET:spm-uploads}
  ocr:
    type: ${APP_OCR_TYPE:tesseract}
    tesseract:
      server-url: ${APP_OCR_TESSERACT_URL:http://spm-tesseract:8080}
  extraction:
    type: ${APP_EXTRACTION_TYPE:stub}
    bedrock:
      model-id: ${APP_EXTRACTION_BEDROCK_MODEL_ID:amazon.nova-2-lite-v1:0}
      model-adapter: ${APP_EXTRACTION_BEDROCK_MODEL_ADAPTER:nova}
      region: ${APP_EXTRACTION_BEDROCK_REGION:ap-southeast-1}
  llm:
    type: ${APP_LLM_TYPE:stub}
    bedrock:
      model-id: ${APP_LLM_BEDROCK_MODEL_ID:amazon.nova-2-lite-v1:0}
      model-adapter: ${APP_LLM_BEDROCK_MODEL_ADAPTER:nova}
      region: ${APP_LLM_BEDROCK_REGION:ap-southeast-1}

# Spring AI Bedrock Converse (used when app.extraction.type=spring-ai)
spring.ai:
  bedrock:
    aws:
      region: ${APP_EXTRACTION_BEDROCK_REGION:ap-southeast-1}
    converse:
      chat:
        enabled: ${SPRING_AI_BEDROCK_ENABLED:false}
        options:
          model: ${APP_EXTRACTION_BEDROCK_MODEL_ID:amazon.nova-2-lite-v1:0}
          temperature: 0.1
          max-tokens: 4096
  report-storage:
    local-path: ${APP_REPORT_STORAGE_LOCAL_PATH:./report-files}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.eggtive.spm: ${LOG_LEVEL:INFO}
