name: Deploy Frontend (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws-region:
        required: false
        type: string
        default: ap-southeast-1

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: spm-frontend/package-lock.json

      - name: Install & build
        working-directory: spm-frontend
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Discover infra from SSM
        id: ssm
        run: |
          PREFIX="/${{ vars.PROJECT_NAME }}/${{ vars.ENVIRONMENT }}/cicd"
          echo "frontend-bucket=$(aws ssm get-parameter --name "$PREFIX/frontend-bucket" --query Parameter.Value --output text)" >> "$GITHUB_OUTPUT"
          echo "cf-dist-id=$(aws ssm get-parameter --name "$PREFIX/cloudfront-distribution-id" --query Parameter.Value --output text)" >> "$GITHUB_OUTPUT"

      - name: Deploy to S3 (preserving config.json from infra)
        run: aws s3 sync spm-frontend/dist/ s3://${{ steps.ssm.outputs.frontend-bucket }}/ --delete --exclude "config.json"

      - name: Invalidate CloudFront
        run: |
          DIST_ID="${{ steps.ssm.outputs.cf-dist-id }}"
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          fi
