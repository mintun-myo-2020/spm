spring:
  application:
    name: spm

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spm}
    username: ${DB_USERNAME:spm}
    password: ${DB_PASSWORD:spm}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/spm}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/spm/protocol/openid-connect/certs}

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=3600s

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  keycloak:
    server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8180}
    realm: ${KEYCLOAK_REALM:spm}
    admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:spm-backend}
    admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
  storage:
    type: ${APP_STORAGE_TYPE:local}
    local-path: ${APP_STORAGE_LOCAL_PATH:./uploads}
    s3-bucket: ${APP_STORAGE_S3_BUCKET:spm-uploads}
  ocr:
    type: ${APP_OCR_TYPE:tesseract}
    tesseract:
      container-name: ${APP_OCR_TESSERACT_CONTAINER:spm-tesseract}
  report-storage:
    local-path: ${APP_REPORT_STORAGE_LOCAL_PATH:./report-files}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.eggtive.spm: ${LOG_LEVEL:INFO}
