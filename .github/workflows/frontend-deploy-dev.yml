name: Frontend Deploy (Dev)

on:
  push:
    branches: [main]
    paths: ['spm-frontend/**']

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  S3_BUCKET: spm-dev-frontend
  CLOUDFRONT_COMMENT: spm-dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: spm-frontend/package-lock.json

      - name: Install & build
        working-directory: spm-frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.DEV_API_BASE_URL }}
          VITE_KEYCLOAK_URL: ${{ secrets.DEV_KEYCLOAK_URL }}
          VITE_KEYCLOAK_REALM: ${{ secrets.DEV_KEYCLOAK_REALM }}
          VITE_KEYCLOAK_CLIENT_ID: ${{ secrets.DEV_KEYCLOAK_CLIENT_ID }}
          VITE_TENANT_NAME: ${{ secrets.DEV_TENANT_NAME }}
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync spm-frontend/dist/ s3://${{ env.S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${{ env.CLOUDFRONT_COMMENT }}'].Id" \
            --output text)
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          fi
