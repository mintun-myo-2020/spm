name: Backend Deploy (Dev)

on:
  push:
    branches: [main]
    paths: ['spm/**']

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  JAVA_VERSION: '25'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Build jar
        working-directory: spm
        run: ./gradlew bootJar --no-daemon

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload jar to S3 staging
        run: |
          JAR_FILE=$(ls spm/build/libs/*.jar | head -1)
          aws s3 cp "$JAR_FILE" s3://${{ secrets.DEV_DEPLOY_BUCKET }}/spm-app.jar

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Service,Values=backend" "Key=tag:Environment,Values=dev" \
            --parameters 'commands=[
              "aws s3 cp s3://${{ secrets.DEV_DEPLOY_BUCKET }}/spm-app.jar /opt/spm/spm-app.jar",
              "sudo systemctl restart spm"
            ]' \
            --output text
